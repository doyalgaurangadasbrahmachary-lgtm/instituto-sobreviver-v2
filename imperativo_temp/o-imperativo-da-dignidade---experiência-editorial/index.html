
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Imperativo da Dignidade | Relatório Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #24526E;
            --cyan: #34BBCE;
            --cream: #F9F7F2;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--navy);
            scroll-behavior: smooth;
        }
        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }
        .drop-cap::first-letter {
            font-family: 'Playfair Display', serif;
            float: left;
            font-size: 5rem;
            line-height: 4rem;
            padding-top: 0.5rem;
            padding-right: 0.8rem;
            color: var(--cyan);
            font-weight: 700;
        }
        .text-justify {
            text-align: justify;
            hyphens: auto;
        }
        ::selection {
            background-color: var(--cyan);
            color: white;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cream);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--navy);
            border-radius: 10px;
        }
    </style>
